name: Build Agent

on:
  push:
    branches: [main]
    tags:     ['agent/v*']
    paths:    ['agent/**']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version override (e.g. 1.2.0). Leave empty → reads agent/VERSION'
        required: false
        default: ''

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 30
    permissions:
      contents: write   # required for softprops/action-gh-release to create releases

    steps:
    # -------------------------------------------------------------------------
    # 1. Checkout
    # -------------------------------------------------------------------------
    - name: Checkout
      uses: actions/checkout@v4

    # -------------------------------------------------------------------------
    # 2. Resolve version
    # -------------------------------------------------------------------------
    - name: Resolve version
      id: ver
      shell: pwsh
      run: |
        $v = "${{ github.event.inputs.version }}"
        if (-not $v) {
          if ("${{ github.ref }}" -match '^refs/tags/agent/v(.+)$') {
            $v = $Matches[1]
          } else {
            $v = (Get-Content agent/VERSION -Raw).Trim()
          }
        }
        echo "VERSION=$v" | Out-File -FilePath $env:GITHUB_ENV -Append
        echo "version=$v" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
        Write-Host "Building version: $v"

    # -------------------------------------------------------------------------
    # 3. Setup .NET 8 SDK
    # -------------------------------------------------------------------------
    - name: Setup .NET 8
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    # -------------------------------------------------------------------------
    # 4. Setup Python (for extension packer and installer bundler)
    # -------------------------------------------------------------------------
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install Python dependencies
      shell: pwsh
      run: pip install cryptography

    # -------------------------------------------------------------------------
    # 5. Patch version in .csproj
    # -------------------------------------------------------------------------
    - name: Patch csproj version
      shell: pwsh
      run: |
        $csproj = "agent/src/Seamlean.Agent/Seamlean.Agent.csproj"
        $xml = [xml](Get-Content $csproj)
        $numericVer = "${{ env.VERSION }}" -replace '-.*$', ''
        $xml.Project.PropertyGroup.Version            = "${{ env.VERSION }}"
        $xml.Project.PropertyGroup.AssemblyVersion    = "$numericVer.0"
        $xml.Project.PropertyGroup.FileVersion        = "$numericVer.0"
        $xml.Save((Resolve-Path $csproj))
        Write-Host "Version set to ${{ env.VERSION }}"

    # -------------------------------------------------------------------------
    # 6. Restore NuGet packages
    # -------------------------------------------------------------------------
    - name: Restore NuGet packages
      shell: pwsh
      run: |
        $output = dotnet restore agent/src/Seamlean.Agent/Seamlean.Agent.csproj -r win-x64 2>&1
        $output | Write-Host
        if ($LASTEXITCODE -ne 0) {
          @"
        ## Restore Errors
        ``````
        $($output -join "`n")
        ``````
        "@ | Add-Content $env:GITHUB_STEP_SUMMARY
          exit 1
        }

    # -------------------------------------------------------------------------
    # 6b. Build Seamlean.Agent.exe
    # -------------------------------------------------------------------------
    - name: Build agent (dotnet publish)
      shell: pwsh
      run: |
        New-Item -ItemType Directory -Force -Path build | Out-Null
        $output = dotnet publish agent/src/Seamlean.Agent/Seamlean.Agent.csproj `
          -c Release `
          -r win-x64 `
          --self-contained true `
          --no-restore `
          -p:PublishSingleFile=true `
          -p:IncludeNativeLibrariesForSelfExtract=true `
          -o build/agent 2>&1
        $output | Write-Host
        if ($LASTEXITCODE -ne 0) {
          @"
        ## Build Errors (dotnet publish)
        ``````
        $($output -join "`n")
        ``````
        "@ | Add-Content $env:GITHUB_STEP_SUMMARY
          exit 1
        }
        Copy-Item build/agent/Seamlean.Agent.exe build/Seamlean.Agent.exe
        $size = (Get-Item build/Seamlean.Agent.exe).Length / 1MB
        Write-Host "Seamlean.Agent.exe: $([math]::Round($size, 1)) MB"

    # -------------------------------------------------------------------------
    # 7. Prepare extension private key from secret
    # -------------------------------------------------------------------------
    - name: Decode extension private key
      shell: pwsh
      env:
        EXTENSION_PRIVATE_KEY: ${{ secrets.EXTENSION_PRIVATE_KEY }}
      run: |
        if (-not $env:EXTENSION_PRIVATE_KEY) {
          Write-Error "Secret EXTENSION_PRIVATE_KEY is not set. Run tools/generate_key.py first."
          exit 1
        }
        $pem = [System.Text.Encoding]::UTF8.GetString(
          [System.Convert]::FromBase64String($env:EXTENSION_PRIVATE_KEY)
        )
        $pem | Set-Content agent/tools/extension.pem -Encoding UTF8
        Write-Host "Private key decoded"

    # -------------------------------------------------------------------------
    # 8. Pack CRX3 extension + compute extension ID
    # -------------------------------------------------------------------------
    - name: Pack Chrome extension (CRX3)
      shell: pwsh
      run: |
        Copy-Item agent/browser-extension build/extension -Recurse -Force

        python agent/tools/pack_extension.py `
          --key             agent/tools/extension.pem `
          --src             agent/browser-extension `
          --output          build/extension.crx `
          --id-out          build/extension-id.txt `
          --patch-manifest  build/extension/manifest.json

        $id = Get-Content build/extension-id.txt
        echo "EXTENSION_ID=$id" | Out-File -FilePath $env:GITHUB_ENV -Append
        Write-Host "Extension ID: $id"

        $mPath = "build/extension/manifest.json"
        $m = Get-Content $mPath -Raw | ConvertFrom-Json
        $m.version = "${{ env.VERSION }}"
        $m | ConvertTo-Json -Depth 5 | Set-Content $mPath -Encoding UTF8
        Write-Host "Extension version set to ${{ env.VERSION }}"

    # -------------------------------------------------------------------------
    # 9. Patch extension ID into native-messaging-host.json
    # -------------------------------------------------------------------------
    - name: Patch native-messaging-host.json
      shell: pwsh
      run: |
        $id  = "${{ env.EXTENSION_ID }}"
        $src = Get-Content agent/browser-extension/native-messaging-host.json -Raw | ConvertFrom-Json
        $src.allowed_origins = @("chrome-extension://$id/")
        $src.path = "C:\Program Files\Windows Diagnostics\Seamlean.Agent.exe"
        $src | ConvertTo-Json -Depth 5 | Set-Content build/native-messaging-host.json -Encoding UTF8
        Write-Host "Patched allowed_origins: chrome-extension://$id/"

    # -------------------------------------------------------------------------
    # 10. Copy remaining build inputs
    # -------------------------------------------------------------------------
    - name: Copy build inputs
      shell: pwsh
      run: |
        Copy-Item agent/src/Seamlean.Agent/appsettings.json build/appsettings.json

    # -------------------------------------------------------------------------
    # 11. Generate installer script
    # -------------------------------------------------------------------------
    - name: Generate installer script
      shell: pwsh
      run: |
        python agent/tools/make_installer.py `
          --version           ${{ env.VERSION }} `
          --ext-id            ${{ env.EXTENSION_ID }} `
          --server-thumbprint "${{ secrets.SERVER_THUMBPRINT }}" `
          --profile-url       "${{ secrets.CLOUD_PROFILE_URL }}" `
          --out               build/Install-Seamlean.Agent.ps1

    - name: Verify installer is pure ASCII
      shell: python
      run: |
        data = open('build/Install-Seamlean.Agent.ps1', 'rb').read()
        bad = [i for i in range(len(data)) if data[i] > 127]
        if bad:
            raise SystemExit(f'Non-ASCII bytes in installer at positions: {bad[:5]} — breaks PowerShell on Windows-1252')
        print(f'Installer encoding OK ({len(data)} bytes, pure ASCII)')

    - name: Copy WinDiagUpdater.ps1
      shell: pwsh
      run: Copy-Item agent/installer/WinDiagUpdater.ps1 build/WinDiagUpdater.ps1

    # -------------------------------------------------------------------------
    # 12. Build latest.json for OTA updates
    # -------------------------------------------------------------------------
    - name: Build latest.json
      shell: pwsh
      run: |
        $hash = (Get-FileHash build/Seamlean.Agent.exe -Algorithm SHA256).Hash.ToLower()
        $exeUrl = "https://github.com/${{ github.repository }}/releases/download/agent%2Fv${{ env.VERSION }}/Seamlean.Agent.exe"
        $manifest = @{
          version     = "${{ env.VERSION }}"
          released_at = (Get-Date -Format "o")
          exe_url     = $exeUrl
          sha256      = $hash
          min_version = "1.0.0"
          changelog   = "Build ${{ github.run_number }} from ${{ github.sha }}"
        } | ConvertTo-Json
        $manifest | Set-Content build/latest.json -Encoding UTF8
        Write-Host "exe_url: $exeUrl  SHA256: $hash"

    # -------------------------------------------------------------------------
    # 13. Wipe private key from runner
    # -------------------------------------------------------------------------
    - name: Wipe private key
      if: always()
      shell: pwsh
      run: Remove-Item agent/tools/extension.pem -ErrorAction SilentlyContinue

    # -------------------------------------------------------------------------
    # 14. Upload installer artifact
    # -------------------------------------------------------------------------
    - name: Upload installer artifact
      uses: actions/upload-artifact@v4
      with:
        name: Seamlean-Agent-${{ env.VERSION }}
        path: |
          build/Install-Seamlean.Agent.ps1
          build/Seamlean.Agent.exe
          build/extension.crx
          build/extension/
          build/native-messaging-host.json
          build/appsettings.json
          build/WinDiagUpdater.ps1
          build/latest.json
        retention-days: 30

    # -------------------------------------------------------------------------
    # 15. Create GitHub Release (only on tag push or manual with version)
    # -------------------------------------------------------------------------
    - name: Create GitHub Release
      if: contains(github.ref, '-stable')
      uses: softprops/action-gh-release@v2
      with:
        tag_name: agent/v${{ env.VERSION }}
        name: Seamlean Agent v${{ env.VERSION }}
        body: |
          ## Установка

          1. Скачать `Seamlean.Agent.exe`
          2. Запустить от имени администратора:
          ```
          Seamlean.Agent.exe --install
          ```

          **Extension ID:** `${{ env.EXTENSION_ID }}`
          **Build:** ${{ github.run_number }} | **Commit:** ${{ github.sha }}
        files: |
          build/Seamlean.Agent.exe
          build/latest.json
        generate_release_notes: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    # -------------------------------------------------------------------------
    # 16. Job summary
    # -------------------------------------------------------------------------
    - name: Write job summary
      if: always()
      shell: pwsh
      run: |
        $size = if (Test-Path "build/Seamlean.Agent.exe") {
          "$([math]::Round((Get-Item 'build/Seamlean.Agent.exe').Length / 1MB, 1)) MB"
        } else { "N/A" }

        @"
        ## Seamlean Agent Build v${{ env.VERSION }}

        | Параметр | Значение |
        |---|---|
        | Версия | ``${{ env.VERSION }}`` |
        | Extension ID | ``${{ env.EXTENSION_ID }}`` |
        | Размер exe | $size |
        | Commit | ``${{ github.sha }}`` |
        | Run | #${{ github.run_number }} |

        ### Артефакты
        - ``Seamlean.Agent.exe`` — единый бинарь (агент + установщик)
        - ``latest.json`` — манифест OTA обновления
        "@ | Add-Content $env:GITHUB_STEP_SUMMARY

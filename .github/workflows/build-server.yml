name: Build Server

on:
  push:
    tags:  ['server/v*']
    paths: ['server/**']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version override. Leave empty → reads server/VERSION'
        required: false
        default: ''

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      packages: write

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Resolve version
      id: ver
      run: |
        V="${{ github.event.inputs.version }}"
        if [ -z "$V" ]; then
          if [[ "${{ github.ref }}" =~ ^refs/tags/server/v(.+)$ ]]; then
            V="${BASH_REMATCH[1]}"
          else
            V="$(cat server/VERSION).dev${{ github.run_number }}"
          fi
        fi
        echo "VERSION=$V" >> $GITHUB_ENV
        echo "version=$V" >> $GITHUB_OUTPUT
        echo "Server version: $V"

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Lint
      run: |
        pip install ruff --quiet
        ruff check server/ --ignore E501 || true

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to GHCR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and push server-api
      uses: docker/build-push-action@v6
      with:
        context: server
        file: server/api/Dockerfile
        push: true
        build-args: APP_VERSION=${{ env.VERSION }}
        tags: |
          ghcr.io/sabaleuskivitali/claude_developer/server-api:${{ env.VERSION }}
          ghcr.io/sabaleuskivitali/claude_developer/server-api:latest
        cache-from: type=gha,scope=server-api
        cache-to:   type=gha,scope=server-api,mode=max

    - name: Build and push server-worker
      uses: docker/build-push-action@v6
      with:
        context: server
        file: server/analytics/Dockerfile
        push: true
        build-args: APP_VERSION=${{ env.VERSION }}
        tags: |
          ghcr.io/sabaleuskivitali/claude_developer/server-worker:${{ env.VERSION }}
          ghcr.io/sabaleuskivitali/claude_developer/server-worker:latest
        cache-from: type=gha,scope=server-worker
        cache-to:   type=gha,scope=server-worker,mode=max

    - name: Create GitHub Release
      if: startsWith(github.ref, 'refs/tags/server/v')
      uses: softprops/action-gh-release@v2
      with:
        tag_name: server/v${{ env.VERSION }}
        name: Server v${{ env.VERSION }}
        body: |
          ## Server v${{ env.VERSION }}

          **Build:** ${{ github.run_number }} | **Commit:** ${{ github.sha }}

          **Images:**
          - `ghcr.io/sabaleuskivitali/claude_developer/server-api:${{ env.VERSION }}`
          - `ghcr.io/sabaleuskivitali/claude_developer/server-worker:${{ env.VERSION }}`
        generate_release_notes: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Deploy to server
      if: startsWith(github.ref, 'refs/tags/server/v')
      env:
        SERVER_SSH_KEY:   ${{ secrets.SERVER_SSH_KEY }}
        SERVER_SUDO_PASS: ${{ secrets.SERVER_SUDO_PASS }}
        GHCR_TOKEN:       ${{ secrets.GITHUB_TOKEN }}
        VERSION:          ${{ env.VERSION }}
      run: |
        echo "$SERVER_SSH_KEY" > /tmp/deploy_key
        chmod 600 /tmp/deploy_key
        ssh -i /tmp/deploy_key \
          -p 5322 \
          -o StrictHostKeyChecking=no \
          -o ConnectTimeout=15 \
          nubes@195.222.86.67 \
          "echo '${SERVER_SUDO_PASS}' | sudo -S bash -c '
            set -e
            cd /opt/seamlean/server
            git pull
            sed -i '/^SERVER_VERSION=/d' .env
            echo \"SERVER_VERSION=${VERSION}\" >> .env
            echo \"${GHCR_TOKEN}\" | docker login ghcr.io -u sabaleuskivitali --password-stdin
            docker compose pull
            docker compose up -d --remove-orphans
          '"
        rm -f /tmp/deploy_key

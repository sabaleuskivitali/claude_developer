name: Build Server

on:
  push:
    tags:  ['server/v*']
    paths: ['server/**']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version override. Leave empty → reads server/VERSION'
        required: false
        default: ''

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Resolve version
      id: ver
      run: |
        V="${{ github.event.inputs.version }}"
        if [ -z "$V" ]; then
          if [[ "${{ github.ref }}" =~ ^refs/tags/server/v(.+)$ ]]; then
            V="${BASH_REMATCH[1]}"
          else
            V="$(cat server/VERSION).dev${{ github.run_number }}"
          fi
        fi
        echo "VERSION=$V" >> $GITHUB_ENV
        echo "version=$V" >> $GITHUB_OUTPUT
        echo "Server version: $V"

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Lint
      run: |
        pip install ruff --quiet
        ruff check server/ --ignore E501 || true

    - name: Validate docker-compose
      uses: docker/setup-buildx-action@v3

    - name: Build Docker images
      working-directory: server
      run: docker compose build

    - name: Create GitHub Release
      if: startsWith(github.ref, 'refs/tags/server/v')
      uses: softprops/action-gh-release@v2
      with:
        tag_name: server/v${{ env.VERSION }}
        name: Server v${{ env.VERSION }}
        body: |
          ## Server v${{ env.VERSION }}

          ### Деплой
          ```bash
          cd server
          docker compose pull
          docker compose up -d
          ```
          **Build:** ${{ github.run_number }} | **Commit:** ${{ github.sha }}
        generate_release_notes: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

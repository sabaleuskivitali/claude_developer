services:
  postgres:
    image: postgres:16-alpine
    container_name: ${SERVER_NAME}_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-diag}
      POSTGRES_USER:     ${POSTGRES_USER:-diag}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-diag} -d ${POSTGRES_DB:-diag}"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: ${SERVER_NAME}_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER:     ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    volumes:
      - minio_data:/data
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    image: ghcr.io/sabaleuskivitali/claude_developer/server-api:${SERVER_VERSION:-latest}
    container_name: ${SERVER_NAME}_api
    restart: unless-stopped
    network_mode: host
    environment:
      POSTGRES_DSN:       postgresql://${POSTGRES_USER:-diag}:${POSTGRES_PASSWORD}@127.0.0.1:5432/${POSTGRES_DB:-diag}
      API_KEY:            ${API_KEY}
      MINIO_ENDPOINT:     127.0.0.1:9000
      MINIO_ACCESS_KEY:   ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY:   ${MINIO_SECRET_KEY}
      PORT_RANGE_START:   ${PORT_RANGE_START:-49200}
      PORT_RANGE_END:     ${PORT_RANGE_END:-49300}
      UPDATE_PACKAGES_DIR: /updates
      CLOUD_URL:          ${CLOUD_URL:-}
      CLOUD_SERVER_TOKEN: ${CLOUD_SERVER_TOKEN:-}
      SERVER_URL:         ${SERVER_URL:-}
      SERVER_NAME:        ${SERVER_NAME:-server}
    volumes:
      - api_certs:/certs
      - api_runtime:/app/runtime
      - ${UPDATE_PACKAGES_DIR:-/home/nubes/updates}:/updates:ro
      - /etc/avahi/services:/etc/avahi/services  # mDNS: avahi-daemon on host picks this up
      - /var/run/docker.sock:/var/run/docker.sock:ro  # admin: read container logs + restart
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy

  worker:
    image: ghcr.io/sabaleuskivitali/claude_developer/server-worker:${SERVER_VERSION:-latest}
    container_name: ${SERVER_NAME}_worker
    restart: unless-stopped
    network_mode: host
    environment:
      POSTGRES_DSN:       postgresql://${POSTGRES_USER:-diag}:${POSTGRES_PASSWORD}@127.0.0.1:5432/${POSTGRES_DB:-diag}
      ANTHROPIC_API_KEY:  ${ANTHROPIC_API_KEY}
      MINIO_ENDPOINT:     127.0.0.1:9000
      MINIO_ACCESS_KEY:   ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY:   ${MINIO_SECRET_KEY}
      MINIO_SECURE:       "false"
      VISION_BATCH_SIZE:  ${VISION_BATCH_SIZE:-20}
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy

  ofelia:
    image: mcuadros/ofelia:latest
    container_name: ${SERVER_NAME}_ofelia
    restart: unless-stopped
    network_mode: host
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - worker
    command: daemon --docker
    labels:
      ofelia.job-exec.vision.schedule:     "0 */2 * * *"
      ofelia.job-exec.vision.container:    "${SERVER_NAME}_worker"
      ofelia.job-exec.vision.command:      "python run_pipeline.py vision --batch-size ${VISION_BATCH_SIZE:-20}"

      ofelia.job-exec.reconstruct.schedule: "30 */2 * * *"
      ofelia.job-exec.reconstruct.container: "${SERVER_NAME}_worker"
      ofelia.job-exec.reconstruct.command:   "python run_pipeline.py reconstruct --lookback-hours 48"

      ofelia.job-exec.fte.schedule:        "0 3 * * *"
      ofelia.job-exec.fte.container:       "${SERVER_NAME}_worker"
      ofelia.job-exec.fte.command:         "python run_pipeline.py fte --lookback-days 30"

      ofelia.job-exec.meetings.schedule:   "0 */3 * * *"
      ofelia.job-exec.meetings.container:  "${SERVER_NAME}_worker"
      ofelia.job-exec.meetings.command:    "python run_pipeline.py meetings --batch-size 5"

  nginx:
    image: nginx:alpine
    container_name: ${SERVER_NAME}_nginx
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./nginx/stream.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api

volumes:
  postgres_data:
  minio_data:
  api_certs:
  api_runtime:

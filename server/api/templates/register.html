{% extends "base.html" %}
{% block title %}Регистрация — Seamlean{% endblock %}

{% block body %}
<div style="max-width:400px; margin:5rem auto; padding:0 1.5rem;">
  <div class="card">
    <h1 style="font-size:1.5rem; font-weight:700; margin-bottom:1.5rem;">Создать аккаунт</h1>

    {% if error %}
    <div class="alert alert-error">{{ error }}</div>
    {% endif %}

    <form method="post" action="/register">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required autofocus placeholder="you@company.com">
      </div>
      <div class="form-group">
        <label for="password">Пароль</label>
        <input type="password" id="password" name="password" required placeholder="Минимум 6 символов">
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%; margin-top:.5rem;">Зарегистрироваться</button>
    </form>

    <p style="margin-top:1.2rem; font-size:.88rem; color:#666; text-align:center;">
      Уже есть аккаунт? <a href="/login">Войти</a>
    </p>
  </div>
</div>
{% endblock %}

services:
  api:
    build: .
    env_file: .env
    volumes:
      - ./profiles:/app/profiles
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=3)"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s

  admin:
    build:
      context: .
      dockerfile: Dockerfile.admin
    volumes:
      - ./data:/app/data   # shared: reads admin.db + users.db written by api
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/admin/health', timeout=3)"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s

  nginx:
    image: nginx:alpine
    ports:
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      api:
        condition: service_healthy
      admin:
        condition: service_healthy
    restart: unless-stopped

  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel --config /etc/cloudflared/config.yml run
    volumes:
      - ./cloudflared-config.yml:/etc/cloudflared/config.yml:ro
      - ./cloudflared-creds.json:/etc/cloudflared/creds.json:ro
    depends_on:
      - nginx
    restart: unless-stopped
